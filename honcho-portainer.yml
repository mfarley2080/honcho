# Honcho - AI Memory Layer
# https://github.com/plastic-labs/honcho
#
# Portainer stack — deploy from git repo mfarley2080/honcho
# Set stack.env path to "stack.env" in Portainer git stack settings.
#
# These must be set as environment overrides in Portainer (not in stack.env):
#   DB_PASSWORD       postgres password
#   LLM_API_KEY       LiteLLM key for LLM calls (deriver, dialectic, summary, dream)
#   EMBEDDING_API_KEY LiteLLM key for embedding calls (can differ from LLM_API_KEY)
#   AUTH_JWT_SECRET   JWT secret: python3 -c "import secrets; print(secrets.token_hex(32))"
#   AUTH_USE_AUTH     true to require JWT auth on all API requests (recommended for production)
#
# Host directory setup (run once on TrueNAS before first deploy):
#   bash build.sh    — builds honcho:latest locally from upstream
#   bash setup.sh    — creates /mnt/tank/docker/honcho/{postgres,redis,logs} with correct ownership

services:

  api:
    image: honcho:latest
    entrypoint: ["sh", "docker/entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "/app/.venv/bin/python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${DB_PASSWORD}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - AUTH_USE_AUTH=${AUTH_USE_AUTH}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOCAL_METRICS_FILE=/app/logs/metrics.jsonl
      - REASONING_TRACES_FILE=/app/logs/traces.jsonl
      # LLM key — used as the default OpenAI transport key for all LLM components
      - LLM_OPENAI_API_KEY=${LLM_API_KEY}
      # Embeddings — separate endpoint and key from LLM
      - EMBEDDING_MODEL_CONFIG__TRANSPORT=openai
      - EMBEDDING_MODEL_CONFIG__MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL=${EMBEDDING_BASE_URL}
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_VECTOR_DIMENSIONS=${EMBEDDING_DIMENSIONS}
      # Deriver
      - DERIVER_MODEL_CONFIG__TRANSPORT=openai
      - DERIVER_MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      # Dialectic (5 reasoning levels)
      - DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      - DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      - DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      - DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      - DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      # Summary
      - SUMMARY_MODEL_CONFIG__TRANSPORT=openai
      - SUMMARY_MODEL_CONFIG__MODEL=${LLM_MODEL}
      - SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      # Dream
      - DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT=openai
      - DREAM_DEDUCTION_MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      - DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT=openai
      - DREAM_INDUCTION_MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
    volumes:
      - ${DATA_PATH}/logs:/app/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.honcho.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.honcho.entrypoints=websecure"
      - "traefik.http.routers.honcho.tls=true"
      - "traefik.http.routers.honcho.tls.certresolver=production"
      - "traefik.http.services.honcho.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik-frontend"
    networks:
      - traefik-frontend
      - honcho-internal

  deriver:
    image: honcho:latest
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${DB_PASSWORD}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - LOG_LEVEL=${LOG_LEVEL}
      - LOCAL_METRICS_FILE=/app/logs/metrics.jsonl
      - REASONING_TRACES_FILE=/app/logs/traces.jsonl
      # LLM
      - LLM_OPENAI_API_KEY=${LLM_API_KEY}
      - DERIVER_MODEL_CONFIG__TRANSPORT=openai
      - DERIVER_MODEL_CONFIG__MODEL=${LLM_MODEL}
      - DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL=${LLM_BASE_URL}
      # Embeddings — separate endpoint and key
      - EMBEDDING_MODEL_CONFIG__TRANSPORT=openai
      - EMBEDDING_MODEL_CONFIG__MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL=${EMBEDDING_BASE_URL}
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_VECTOR_DIMENSIONS=${EMBEDDING_DIMENSIONS}
    volumes:
      - ${DATA_PATH}/logs:/app/logs
    networks:
      - honcho-internal

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ${DATA_PATH}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - honcho-internal

  redis:
    image: redis:8.2
    restart: unless-stopped
    volumes:
      - ${DATA_PATH}/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - honcho-internal

networks:
  traefik-frontend:
    external: true
  honcho-internal:
